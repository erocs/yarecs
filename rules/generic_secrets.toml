# generic_secrets.toml — Hardcoded credential / secret detection
#
# Applies to any C-like source file.  Run alongside a language-specific ruleset:
#   cish-scanner --config examples/generic_secrets.toml \
#                --config examples/c_cpp_security.toml  \
#                --extensions c,cpp,h  src/
#
# All rules use search = "all" so that secrets inside string literals,
# comments, and raw code are all caught.
#
# Rules are translated from the semgrep community generic/secrets ruleset
# (https://github.com/semgrep/semgrep-rules/tree/develop/generic/secrets)
# and the gitleaks-derived rules in that same repository.
# Entropy-only rules and AST metavariable rules are omitted as untranslatable.
# CWE-798: Use of Hard-coded Credentials unless otherwise noted.

# ══════════════════════════════════════════════════════════════════════════════
# AWS
# ══════════════════════════════════════════════════════════════════════════════

[[rules]]
name     = "sec_aws_access_key_id"
pattern  = '\b(A3T[A-Z0-9]|AKIA|AGPA|AROA|AIPA|ANPA|ANVA|ASIA)[A-Z0-9]{16}\b'
scope    = "**"
search   = "all"
severity = "error"
message  = "AWS Access Key ID detected — hardcoded credentials; store in environment variables or a secrets manager (CWE-798)"

# Matches patterns like: aws_secret_access_key = "...", AWS_SECRET="...", etc.
[[rules]]
name     = "sec_aws_secret_access_key"
pattern  = '(?i)aws.{0,10}secret.{0,20}[=:]\s{0,10}[A-Za-z0-9/+=]{40}'
scope    = "**"
search   = "all"
severity = "error"
message  = "AWS Secret Access Key detected — hardcoded credentials; use IAM roles or a secrets manager (CWE-798)"

[[rules]]
name     = "sec_aws_session_token"
pattern  = '(?i)AWS_SESSION_TOKEN\s*(:|=>|=)\s*[A-Za-z0-9/+=]{16,}'
scope    = "**"
search   = "all"
severity = "error"
message  = "AWS Session Token detected — temporary credentials hardcoded; obtain dynamically via STS (CWE-798)"

[[rules]]
name     = "sec_aws_appsync_key"
pattern  = '\bda2-[a-z0-9]{26}\b'
scope    = "**"
search   = "all"
severity = "error"
message  = "AWS AppSync GraphQL API key detected — hardcoded; use environment variables or secrets manager (CWE-798)"

[[rules]]
name     = "sec_amazon_mws_auth_token"
pattern  = 'amzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
scope    = "**"
search   = "all"
severity = "error"
message  = "Amazon MWS Auth Token detected — hardcoded marketplace credential (CWE-798)"


