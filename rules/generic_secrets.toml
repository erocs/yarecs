# ══════════════════════════════════════════════════════════════════════════════
# Certificates and cryptographic keys
# ══════════════════════════════════════════════════════════════════════════════

# JWT tokens embedded in source code (header.payload.signature format).
# CWE-321: Use of Hard-coded Cryptographic Key
[[rules]]
name     = "sec_jwt_token"
pattern  = '\bey[a-zA-Z0-9]{17,}\.ey[a-zA-Z0-9\/\\_\-]{17,}\.(?:[a-zA-Z0-9\/\\_\-]{10,}={0,2})?\b'
scope    = "**"
search   = "all"
severity = "error"
message  = "JWT token detected — hardcoded tokens bypass expiry; load from auth flow at runtime (CWE-321)"

# PGP private key block embedded in source.
[[rules]]
name     = "sec_pgp_private_key"
pattern  = '-----BEGIN PGP PRIVATE KEY BLOCK-----'
scope    = "**"
search   = "all"
severity = "error"
message  = "PGP private key block detected — never embed private keys in source; use a key file outside the repo (CWE-798)"

# Generic private key header (RSA, DSA, EC, OpenSSH, PKCS8 …)
[[rules]]
name     = "sec_private_key"
pattern  = '-----BEGIN [A-Z0-9 _-]{0,40}PRIVATE KEY(?: BLOCK)?-----'
scope    = "**"
search   = "all"
severity = "error"
message  = "Private key PEM block detected — never embed private keys in source; store outside the repo (CWE-798)"

# Hardcoded bcrypt hash — indicates a password is stored in source code.
# CWE-259: Use of Hard-coded Password
[[rules]]
name     = "sec_bcrypt_hash"
pattern  = '\$2[aby]?\$[0-9]{2}\$[./A-Za-z0-9]{53}'
scope    = "**"
search   = "all"
severity = "warning"
message  = "Hardcoded bcrypt hash — likely a hardcoded password; load credentials from a secrets manager (CWE-259)"


