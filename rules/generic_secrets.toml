# ══════════════════════════════════════════════════════════════════════════════
# Google / GCP
# ══════════════════════════════════════════════════════════════════════════════

[[rules]]
name     = "sec_google_api_key"
pattern  = '\bAIzaSy[0-9A-Za-z\-_]{33}\b'
scope    = "**"
search   = "all"
severity = "error"
message  = "Google API Key detected — hardcoded; restrict key in GCP console and store in environment variables (CWE-798)"

[[rules]]
name     = "sec_google_oauth_access_token"
pattern  = '\bya29\.[0-9A-Za-z\-_]+'
scope    = "**"
search   = "all"
severity = "error"
message  = "Google OAuth access token detected — short-lived but still sensitive; do not hardcode (CWE-798)"

[[rules]]
name     = "sec_google_oauth_client_id"
pattern  = '[0-9]+-[0-9A-Za-z_]{32}\.apps\.googleusercontent\.com'
scope    = "**"
search   = "all"
severity = "warning"
message  = "Google OAuth client ID detected — verify this is not also accompanied by a hardcoded client secret (CWE-798)"

# Flags the \"type\": \"service_account\" marker that anchors GCP service account JSON
[[rules]]
name     = "sec_google_service_account"
pattern  = '(?i)"type"\s*:\s*"service_account"'
scope    = "**"
search   = "all"
severity = "warning"
message  = "Google service account JSON marker — verify no private_key is hardcoded alongside this (CWE-798)"


