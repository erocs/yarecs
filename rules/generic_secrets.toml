scope    = "**"
search   = "all"
severity = "warning"
message  = "/etc/shadow root entry detected in source — shadow file content must not be embedded in code (CWE-798)"


# ══════════════════════════════════════════════════════════════════════════════
# Unicode bidirectional character attack (Trojan Source — CVE-2021-42574)
# CWE-94: Improper Control of Generation of Code
# ══════════════════════════════════════════════════════════════════════════════

# Bidi override/embedding/isolate characters can be used to make source code
# appear different in editors and code review tools than it is to the compiler.
# Dangerous Unicode bidi control code points detected:
#   U+202A LRE  U+202B RLE  U+202D LRO  U+202E RLO
#   U+2066 LRI  U+2067 RLI  U+2068 FSI
#   U+202C PDF  U+2069 PDI
# Note: uses Rust regex \u{HHHH} Unicode escape syntax (double-quoted TOML string).
[[rules]]
name     = "sec_bidi_characters"
pattern  = "[\u202A\u202B\u202C\u202D\u202E\u2066\u2067\u2068\u2069]"
scope    = "**"
search   = "all"
severity = "warning"
message  = "Bidirectional Unicode control character detected — Trojan Source attack vector; review in an editor that reveals hidden characters (CWE-94, CVE-2021-42574)"


# ══════════════════════════════════════════════════════════════════════════════
# Deferred-work markers in code comments
# ══════════════════════════════════════════════════════════════════════════════

# TODO/FIXME/HACK inside a function or method comment may indicate incomplete
# security hardening.  Scope "**::*" limits to named scopes (functions, methods,
# classes) so file-level markers in build scripts etc. are not flagged.
[[rules]]
name     = "sec_security_todo_in_code"
pattern  = '\b(?:TODO|FIXME|HACK|SECURITY)\b'
scope    = "**::*"
search   = "comments"
severity = "warning"
message  = "Deferred-work marker in comment"
