# Test fixtures for rules/generic_secrets.toml
# One [[case]] per rule: hit must fire the rule, miss must NOT fire that rule.
# Extension "c" is used; all rules use search="all" and scope="**" so they match anywhere.
#
# hit_b64_parts: array of base64 fragments decoded and concatenated at test time,
# so no single fragment (when decoded) contains a complete recognisable secret.

rules_file = "rules/generic_secrets.toml"
ext        = "c"

# ── AWS ─────────────────────────────────────────────────────────────────────────

# Pattern: \b(A3T[A-Z0-9]|AKIA|AGPA|...)[A-Z0-9]{16}\b
# AKIA + exactly 16 uppercase alphanum = 20 chars total
[[case]]
rule          = "sec_aws_access_key_id"
hit_b64_parts = ["QUtJQUlPU0ZPRE5ONw==", "RVhBTVBMRQ=="]
miss          = 'aws_key = "my_key"'

# Pattern: (?i)aws.{0,10}secret.{0,20}[=:]\s{0,10}[A-Za-z0-9/+=]{40}
[[case]]
rule          = "sec_aws_secret_access_key"
hit_b64_parts = ["YXdzX3NlY3JldF9rZXk=", "ID0gd0phbHJYVXRuRkVNSS9LN01ERU5HL2JQeFJmaUNZRVhBTVBMRUtFWQ=="]
miss          = 'aws_region = "us-east-1"'

# Pattern: (?i)AWS_SESSION_TOKEN\s*(:|=>|=)\s*[A-Za-z0-9/+=]{16,}
[[case]]
rule          = "sec_aws_session_token"
hit_b64_parts = ["QVdTX1NFU1NJT05fVE9LRU4gPSBBUW9YbnljNGw=", "Y0s0dzRIeEZ3QmFhbUFCQ0RFRkdISUpLTE1OT1A="]
miss          = 'AWS_REGION = "us-east-1"'

# Pattern: \bda2-[a-z0-9]{26}\b
[[case]]
rule          = "sec_aws_appsync_key"
hit_b64_parts = ["ZGEyLWFiY2RlZmdoaWpr", "bG1ub3BxcnN0dXZ3eHl6"]
miss          = 'api_key = "somekey"'

# Pattern: amzn\.mws\.[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
[[case]]
rule          = "sec_amazon_mws_auth_token"
hit_b64_parts = ["YW16bi5td3MuMTIzNDU2NzgtYWJjZA==", "LWVmMDEtMjM0NS02Nzg5YWJjZGVmMDE="]
miss          = 'token = "other_token"'

# ── GitHub ──────────────────────────────────────────────────────────────────────

# Pattern: \bghp_[0-9a-zA-Z]{36}\b
[[case]]
rule          = "sec_github_pat"
hit_b64_parts = ["Z2hwXw==", "YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXpBQkNERUYxMjM0"]
miss          = 'token = "github_token"'

# Pattern: \bgithub_pat_[0-9a-zA-Z_]{82}\b
[[case]]
rule          = "sec_github_fine_grained_pat"
hit_b64_parts = ["Z2l0aHViX3BhdA==", "X2FiY2RlZmdoaWprbG1ub3BxcnN0dXZ3eHl6QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVowMTIzNDU2Nzg5YWJjZGVmZ2hpamtsbW5vcHFyc3Q="]
miss          = 'github_token = "some_value"'

# ── Google / GCP ────────────────────────────────────────────────────────────────

# Pattern: \bAIzaSy[0-9A-Za-z\-_]{33}\b
[[case]]
rule          = "sec_google_api_key"
hit_b64_parts = ["QUl6YVN5", "YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXpBQkNERUZH"]
miss          = 'api_key = "google_key"'

# Pattern: \bya29\.[0-9A-Za-z\-_]+
[[case]]
rule          = "sec_google_oauth_access_token"
hit_b64_parts = ["eWEyOS5hYmNkZWZnaGlqa2xtbm9wcXI=", "c3R1dnd4eXpBQkNERUYwMTIzNDU2Nzg5"]
miss          = 'token = "other"'

# Pattern: [0-9]+-[0-9A-Za-z_]{32}\.apps\.googleusercontent\.com
[[case]]
rule          = "sec_google_oauth_client_id"
hit_b64_parts = ["MTIzNDU2Nzg5MDEyLWFiY2RlZmdoaWprbG1ub3BxcnN0dXZ3", "eHl6MTIzNDU2LmFwcHMuZ29vZ2xldXNlcmNvbnRlbnQuY29t"]
miss          = 'client = "my_client"'

# Pattern: (?i)"type"\s*:\s*"service_account"
[[case]]
rule          = "sec_google_service_account"
hit_b64_parts = ["InR5cGUiOiAic2Vy", "dmljZV9hY2NvdW50Ig=="]
miss          = '"type": "user"'

# ── Cloud / infrastructure ──────────────────────────────────────────────────────

# Pattern: \bdoo_v1_[a-f0-9]{64}\b
[[case]]
rule          = "sec_digitalocean_token"
hit_b64_parts = ["ZG9vX3YxXw==", "YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYQ=="]
miss          = 'do_token = "some_value"'

# Pattern: (?i)cloudflare[0-9a-z\-_\t .]{0,20}[=:>]{1,3}\s{0,10}[a-z0-9_\-]{40}
[[case]]
rule          = "sec_cloudflare_api_key"
hit_b64_parts = ["Y2xvdWRmbGFyZV9hcGlfa2V5ID0gYWJjZGVmZ2hp", "amtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZA=="]
miss          = 'cf_zone = "example.com"'

# Pattern: (?i)heroku.{0,50}[0-9A-Fa-f]{8}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{4}-[0-9A-Fa-f]{12}
[[case]]
rule          = "sec_heroku_api_key"
hit_b64_parts = ["aGVyb2t1X2FwaV9rZXkgPSAiMTIzNDU2Nzgt", "YWJjZC1lZjAxLTIzNDUtNjc4OWFiY2RlZjAxIg=="]
miss          = 'heroku_app = "my-app"'

# Pattern: [a-z0-9]{14}\.atlasv1\.[a-z0-9\-_=]{60,70}
[[case]]
rule          = "sec_hashicorp_tf_token"
hit_b64_parts = ["YWJjZGVmZ2hpamtsbW4uYXRsYXN2MS5hYmNkZWZnaGlqa2xtbm9wcXJzdA==", "dXZ3eHl6MDEyMzQ1Njc4OWFiY2RlZmdoaWprbG1ub3BxcnN0dXZ3eDAxMjM="]
miss          = 'tf_token = "some_value"'

# ── OpenAI ───────────────────────────────────────────────────────────────────────

# Pattern: \bsk-[a-zA-Z0-9]{20}T3BlbkFJ[a-zA-Z0-9]{20}\b
[[case]]
rule          = "sec_openai_api_key"
hit_b64_parts = ["c2stYWJjZGVmZ2hpamtsbW5vcHFyc3RUMw==", "Qmxia0ZKYWJjZGVmZ2hpamtsbW5vcHFyc3Q="]
miss          = 'openai_key = "test"'

# ── Token-prefix services ───────────────────────────────────────────────────────

# Pattern: \bnpm_[a-zA-Z0-9]{36}\b
[[case]]
rule          = "sec_npm_access_token"
hit_b64_parts = ["bnBtXw==", "YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXpBQkNERUYxMjM0"]
miss          = 'npm_config = "registry=https://registry.npmjs.org"'

# Pattern: \bsk_live_[0-9a-zA-Z]{24}\b
[[case]]
rule          = "sec_stripe_secret_key"
hit_b64_parts = ["c2tfbGl2ZV8=", "YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4"]
miss          = 'stripe_key = "test"'

# Pattern: \brk_live_[0-9a-zA-Z]{24}\b
[[case]]
rule          = "sec_stripe_restricted_key"
hit_b64_parts = ["cmtfbGl2ZV8=", "YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4"]
miss_b64_parts = ["cmtfdGVzdF8=", "YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4"]

# Pattern: \bSG\.[a-zA-Z0-9]{22}\.[a-zA-Z0-9\-_]{43}\b
[[case]]
rule          = "sec_sendgrid_api_key"
hit_b64_parts = ["U0cu", "YWJjZGVmZ2hpamtsbW5vcHFyc3R1di5hYmNkZWZnaGlqa2xtbm9wcXJzdHV2d3h5ekFCQ0RFRkdISUpLTE1OT1BR"]
miss          = 'sendgrid_key = "test"'

# Pattern: \bSK[0-9a-fA-F]{32}\b
[[case]]
rule          = "sec_twilio_api_key"
hit_b64_parts = ["U0swMTIzNDU2Nzg5YWJjZGU=", "ZjAxMjM0NTY3ODlhYmNkZWY="]
miss          = 'twilio_key = "test"'

# Pattern: xox[pboa]-[0-9]{8,13}-[0-9]{8,13}-[0-9a-zA-Z]{8,32}
[[case]]
rule          = "sec_slack_token"
hit_b64_parts = ["eG94cC0xMjM0NTY3OC0xMjM=", "NDU2NzgtYWJjZGVmZ2gxMjM0"]
miss          = 'slack_channel = "#general"'

# Pattern: https://hooks\.slack\.com/services/T[a-zA-Z0-9_]{8,10}/B[a-zA-Z0-9_]{8,10}/[a-zA-Z0-9_]{24}
[[case]]
rule          = "sec_slack_webhook"
hit_b64_parts = ["aHR0cHM6Ly9ob29rcy5zbGFjay5jb20vc2VydmljZXMvVEFCQ0RF", "RkdIMS9CQUJDREVGR0gxL2FiY2RlZmdoaWprbG1ub3BxcnN0dXZ3eA=="]
miss          = 'slack_url = "https://slack.com"'

# Pattern: \bsq0atp-[0-9A-Za-z\-_]{22}\b
[[case]]
rule          = "sec_square_access_token"
hit_b64_parts = ["c3EwYXRwLWFiY2RlZmc=", "aGlqa2xtbm9wcXJzdHV2"]
miss          = 'sq_token = "test"'

# Pattern: \bsq0csp-[0-9A-Za-z\-_]{43}\b
[[case]]
rule          = "sec_square_oauth_secret"
hit_b64_parts = ["c3EwY3NwLWFiY2RlZmdoaWprbG1ub3Bxcg==", "c3R1dnd4eXpBQkNERUZHSElKS0xNTk9QUQ=="]
miss          = 'sq_secret = "test"'

# Pattern: \b[0-9a-f]{32}-us[0-9]{1,2}\b
[[case]]
rule          = "sec_mailchimp_api_key"
hit_b64_parts = ["YWJjZGVmMTIzNDU2Nzg5MGFi", "Y2RlZjEyMzQ1Njc4OTAtdXMxMg=="]
miss          = 'mailchimp_token = "test"'

# Pattern: \bkey-[0-9a-zA-Z]{32}\b
[[case]]
rule          = "sec_mailgun_api_key"
hit_b64_parts = ["a2V5LQ==", "YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY="]
miss          = 'mailgun_token = "test"'

# Pattern: \b[0-9]{9,10}:AA[0-9A-Za-z\-_]{33}\b
[[case]]
rule          = "sec_telegram_bot_token"
hit_b64_parts = ["MTIzNDU2Nzg5MDpBQWFiY2RlZmdoaWo=", "a2xtbm9wcXJzdHV2d3h5ekFCQ0RFRjA="]
miss          = 'bot_token = "test"'

# Pattern: (?i)discord[0-9a-z\-_\t .]{0,20}[=:>]{1,3}\s{0,10}[a-f0-9]{64}
[[case]]
rule          = "sec_discord_bot_token"
hit_b64_parts = ["ZGlzY29yZF90b2tlbiA9IGFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYQ==", "YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYQ=="]
miss          = 'discord_channel = "#general"'

# ── Certificates and cryptographic keys ─────────────────────────────────────────

# Pattern: \bey[a-zA-Z0-9]{17,}\.ey[a-zA-Z0-9\/\\_\-]{17,}\.(?:[a-zA-Z0-9\/\\_\-]{10,}={0,2})?\b
[[case]]
rule          = "sec_jwt_token"
hit_b64_parts = ["ZXlKaGJHY2lPaUpJVXpJMU5pSjkuZXlKemRXSWlPaUo=", "MWMyVnlNVEl6SW4wLmFiY2RlZmdoaWprbG1ub3BxcnN0"]
miss          = 'token = "basic_token"'

# Pattern: -----BEGIN PGP PRIVATE KEY BLOCK-----
[[case]]
rule          = "sec_pgp_private_key"
hit_b64_parts = ["LS0tLS1CRUdJTiBQR1AgUFJJ", "VkFURSBLRVkgQkxPQ0stLS0tLQ=="]
miss          = '-----BEGIN PGP PUBLIC KEY BLOCK-----'

# Pattern: -----BEGIN [A-Z0-9 _-]{0,40}PRIVATE KEY(?: BLOCK)?-----
[[case]]
rule          = "sec_private_key"
hit_b64_parts = ["LS0tLS1CRUdJTiBSU0Eg", "UFJJVkFURSBLRVktLS0tLQ=="]
miss          = '-----BEGIN CERTIFICATE-----'

# Pattern: \$2[aby]?\$[0-9]{2}\$[./A-Za-z0-9]{53}
[[case]]
rule          = "sec_bcrypt_hash"
hit_b64_parts = ["JDJhJDEyJGFiY2RlZmdoaWprbG1ub3BxcnN0dXZ3", "eHl6QUJDREVGR0hJSktMTU5PUFFSU1RVVldYWVow"]
miss          = 'hash = "sha256:abcdef"'

# ── Misc services ───────────────────────────────────────────────────────────────

# Pattern: \bAKC[a-zA-Z0-9]{10,}\b
[[case]]
rule          = "sec_artifactory_token"
hit_b64_parts = ["QUtDYWJj", "ZGVmZ2hpag=="]
miss          = 'art_token = "test"'

# Pattern: (?i)snyk.{0,50}[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
[[case]]
rule          = "sec_snyk_api_key"
hit_b64_parts = ["c255a19hcGlfa2V5ID0gIjEyMzQ1Njc4LWE=", "YmNkLWVmMDEtMjM0NS02Nzg5YWJjZGVmMDEi"]
miss          = 'snyk_org = "my-org"'

# Pattern: sshpass\s+-p\s*[^%\s]
[[case]]
rule          = "sec_ssh_password_cli"
hit_b64_parts = ["c3NocGFzcyAtcCBteXBh", "c3N3b3JkIHVzZXJAaG9zdA=="]
miss          = 'ssh -i key.pem user@host'

# Pattern: https://outlook\.office\.com/webhook/[0-9a-f\-]{36}
[[case]]
rule          = "sec_outlook_webhook"
hit_b64_parts = ["aHR0cHM6Ly9vdXRsb29rLm9mZmljZS5jb20vd2ViaG9vay8=", "MTIzNDU2NzgtYWJjZC1lZjAxLTIzNDUtNjc4OWFiY2RlZjAx"]
miss          = 'outlook_email = "user@example.com"'

# Pattern: \b(?:EAACEdEose0cBA|EAAAACZAVC6ygB|EAAAAZAw4)[0-9A-Za-z]+
[[case]]
rule          = "sec_facebook_access_token"
hit_b64_parts = ["RUFBQ0VkRW9zZTBjQkFhYmNkZWY=", "Z2hpamtsbW5vcHFyc3R1dnd4eXo="]
miss          = 'fb_page = "my_page"'

# Pattern: (?i)codeclima.{0,50}[0-9a-f]{64}
[[case]]
rule          = "sec_codeclimate_token"
hit_b64_parts = ["Y29kZWNsaW1hdGVfdG9rZW4gPSAiYWFhYWFhYWFhYWFhYWFhYWFhYWFhYQ==", "YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhIg=="]
miss          = 'codeclimate_org = "my-org"'

# Pattern: (?i)hockey.{0,50}[0-9a-f]{32}
[[case]]
rule          = "sec_hockeyapp_token"
hit_b64_parts = ["aG9ja2V5X3Rva2VuID0gImFiY2RlZjEy", "MzQ1Njc4OTBhYmNkZWYxMjM0NTY3ODkwIg=="]
miss          = 'hockey_app = "my-app"'

# Pattern: \bk2sk_v[0-9]_[0-9a-zA-Z]{24}\b
[[case]]
rule          = "sec_kolide_api_key"
hit_b64_parts = ["azJza192MV9hYmNkZWZnaA==", "aWprbG1ub3BxcnN0dXZ3eA=="]
miss          = 'kolide_org = "my-org"'

# Pattern: access_token\$production\$[0-9a-z]{16}\$[0-9a-z]{32}
# The \$ in the regex matches a literal $ in the source text
[[case]]
rule          = "sec_paypal_braintree_token"
hit_b64_parts = ["YWNjZXNzX3Rva2VuJHByb2R1Y3Rpb24kYWJjZGVmMTIzNDU2", "Nzg5MCRhYmNkZWYxMjM0NTY3ODkwYWJjZGVmMTIzNDU2Nzg5MA=="]
miss          = 'paypal_client = "my-client"'

# Pattern: (?i)sauce.{0,50}[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}
[[case]]
rule          = "sec_sauce_token"
hit_b64_parts = ["c2F1Y2VfdG9rZW4gPSAiMTIzNDU2NzgtYWI=", "Y2QtZWYwMS0yMzQ1LTY3ODlhYmNkZWYwMSI="]
miss          = 'sauce_dc = "us-west-1"'

# Pattern: (?i)softlayer.{0,50}[a-z0-9]{64}
[[case]]
rule          = "sec_softlayer_api_key"
hit_b64_parts = ["c29mdGxheWVyX2FwaSA9ICJhYmNkZWZnaGlqa2xtbm9wcXJzdHV2d3g=", "eXowMTIzNDU2Nzg5YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4MDEyMyI="]
miss          = 'softlayer_user = "myuser"'

# Pattern: (?i)sonar.{0,50}[0-9a-f]{40}
[[case]]
rule          = "sec_sonarqube_api_key"
hit_b64_parts = ["c29uYXJfdG9rZW4gPSAiYWJjZGVmMTIzNDU2Nw==", "ODkwYWJjZGVmMTIzNDU2Nzg5MGFiY2RlZjEyIg=="]
miss          = 'sonar_project = "my-project"'

# Pattern: \bapi_live(?:_[a-zA-Z]{2})?\.[a-zA-Z0-9\-_]{11}\.[\-_a-zA-Z0-9]{32}
[[case]]
rule          = "sec_onfido_live_token"
hit_b64_parts = ["YXBpX2xpdmUuYWJjZGVmZ2hpamsuYWJjZGU=", "ZmdoaWprbG1ub3BxcnN0dXZ3eHl6QUJDREVG"]
miss          = 'onfido_sandbox = "api_sandbox.test"'

# Pattern: (?m)^root:[x!*$]*:[0-9]+:[0-9]
# The (?m) flag makes ^ match at start of any line; the hit starts at line start
[[case]]
rule = "sec_etc_shadow_content"
hit  = 'root:x:0:0:root:/root:/bin/bash'
miss = 'user:x:1000:1000::/home/user:/bin/bash'

# Pattern: [\u202A\u202B\u202C\u202D\u202E\u2066\u2067\u2068\u2069]
# Double-quoted TOML string uses \uHHHH unicode escape
# U+202E is RIGHT-TO-LEFT OVERRIDE (RLO), a common Trojan Source character
[[case]]
rule = "sec_bidi_characters"
hit  = "\u202Ecode"
miss = 'normal_code();'

# scope = "**::*" + search = "comments" — must be inside a function
[[case]]
rule = "sec_security_todo_in_code"
ext  = "c"
hit  = "void f() { /* TODO: fix auth bypass */ }"
miss = "void f() { /* reviewed and safe */ }"
